{% extends "blog/base.html" %}
{% block title %}Blogovi{% endblock %}

{% block content %}

<h2 class="mb-4 text-center">Svi blogovi</h2>

<div class="row">
    {% for user in users %}
        <div class="col-md-4 mb-4">
            <div class="card shadow-sm h-100">
                <div class="card-body text-center">
                    <h4>{{ user.profile.blog_name }}</h4>
                    <p class="text-muted">@{{ user.username }}</p>
                    <a href="{% url 'user_blog' user.username %}" class="btn btn-primary">
                        Otvori blog
                    </a>
                </div>
            </div>
        </div>
    {% endfor %}
</div>

{% endblock %}
