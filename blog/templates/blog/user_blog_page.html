{% extends "blog/blog_base.html" %}

{% block blog_content %}

<h2 class="mb-4">{{ blog.profile.blog_name }}</h2>

{% for post in posts %}
    <div class="card mb-4 shadow-sm">
        <div class="card-body">
            <h4>{{ post.title }}</h4>
            <p>{{ post.content|truncatewords:30 }}</p>
            <a href="{% url 'post_detail' post.id %}" class="btn btn-primary btn-sm">
                Pročitaj više
            </a>
        </div>
    </div>
{% empty %}
    <p>Nema postova.</p>
{% endfor %}

{% endblock %}
