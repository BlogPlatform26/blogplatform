{% extends "blog/layouts/blog_design_base.html" %}
{% load static %}

{% block content %}
    {% include "blog/components/blog_design_styles.html" %}
    <style>
body {
    background: #542b7e;
    color: #f6eeff;
    position: relative;
    overflow-x: hidden;
    min-height: 100vh;
    --analytics-stat-card-bg: rgba(33, 12, 56, 0.16);
    --analytics-stat-card-border: rgba(255, 255, 255, 0.14);
    --analytics-stat-card-color: #f3e8ff;
    --analytics-stat-value-color: #fff0ff;
    --analytics-stat-label-color: rgba(243, 232, 255, 0.78);
    --analytics-stat-card-shadow: none;
    --analytics-page-row-bg: rgba(33, 12, 56, 0.16);
    --analytics-page-row-border: rgba(255, 255, 255, 0.12);
    --analytics-page-row-color: #f3e8ff;
    --analytics-map-card-bg: rgba(33, 12, 56, 0.16);
    --analytics-map-card-border: rgba(255, 255, 255, 0.12);
    --analytics-map-card-shadow: none;
}

body::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: clamp(560px, 62vw, 1000px);
    pointer-events: none;
    z-index: 0;
    background-image:
        linear-gradient(
            to bottom,
            rgba(12, 4, 22, 0.06) 0%,
            rgba(18, 6, 30, 0.14) 14%,
            rgba(30, 10, 50, 0.26) 28%,
            rgba(49, 18, 79, 0.48) 44%,
            rgba(80, 34, 122, 0.72) 62%,
            rgba(102, 47, 153, 0.86) 78%,
            rgba(116, 57, 171, 0.94) 90%,
            #542b7e 100%
        ),
        radial-gradient(circle at 50% 18%, rgba(255, 203, 246, 0.18) 0%, rgba(203, 116, 255, 0.12) 18%, rgba(114, 42, 173, 0.00) 52%),
        url('{% static "blog/images/design-backgrounds/carobna_ljubicasta.jpg" %}');
    background-repeat: no-repeat, no-repeat, no-repeat;
    background-position: center top, center top, center top;
    background-size: 100% 100%, 100% 100%, 100% auto;
}


body::after {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: clamp(520px, 60vw, 900px);
    pointer-events: none;
    z-index: 1;
    opacity: 0.52;
    background-image:
        radial-gradient(circle at 12% 22%, rgba(255, 225, 128, 0.92) 0 1.3px, transparent 2.6px),
        radial-gradient(circle at 18% 34%, rgba(255, 214, 102, 0.76) 0 1px, transparent 2.2px),
        radial-gradient(circle at 28% 18%, rgba(255, 233, 155, 0.85) 0 1.2px, transparent 2.4px),
        radial-gradient(circle at 42% 13%, rgba(255, 220, 124, 0.76) 0 1px, transparent 2.2px),
        radial-gradient(circle at 57% 21%, rgba(255, 229, 140, 0.72) 0 1.1px, transparent 2.4px),
        radial-gradient(circle at 67% 15%, rgba(255, 214, 99, 0.70) 0 0.95px, transparent 2px),
        radial-gradient(circle at 78% 24%, rgba(255, 232, 148, 0.84) 0 1.25px, transparent 2.6px),
        radial-gradient(circle at 86% 34%, rgba(255, 220, 120, 0.68) 0 1px, transparent 2.2px),
        radial-gradient(circle at 22% 54%, rgba(255, 228, 148, 0.58) 0 0.95px, transparent 2.2px),
        radial-gradient(circle at 74% 48%, rgba(255, 221, 118, 0.56) 0 1px, transparent 2.2px),
        radial-gradient(circle at 50% 28%, rgba(255, 222, 128, 0.14) 0, rgba(255, 222, 128, 0.08) 9%, rgba(255, 222, 128, 0.00) 34%),
        radial-gradient(circle at 18% 30%, rgba(255, 221, 122, 0.10) 0, rgba(255, 221, 122, 0.00) 22%),
        radial-gradient(circle at 82% 26%, rgba(255, 221, 122, 0.08) 0, rgba(255, 221, 122, 0.00) 18%);
    background-repeat: no-repeat;
    filter: blur(0.15px);
}

nav.navbar {
    position: relative;
    z-index: 4000 !important;
}

nav.navbar .dropdown-menu {
    z-index: 4100 !important;
}

.container-fluid.mt-3,
footer {
    position: relative;
    z-index: 2;
}

.blog-header-wrap,
.blog-main-layout-row {
    position: relative;
    z-index: 2;
    max-width: min(1560px, calc(100vw - 40px));
    margin-left: auto;
    margin-right: auto;
}

.blog-header-wrap > .row,
.blog-main-layout-row,
.blog-banner-strip > .row {
    --bs-gutter-x: 22px;
}

.blog-header-main {
    background: transparent !important;
    border: 0 !important;
    box-shadow: none !important;
    padding-top: 18px;
}

.blog-header-main,
.blog-header-main .blog-user-dropdown-toggle,
.blog-header-main .small,
.blog-header-main span,
.blog-header-main strong {
    color: #f4eaff !important;
    text-shadow: 0 2px 18px rgba(52, 14, 84, 0.42);
}

.blog-page-title,
.blog-page-title a {
    color: #fff3ff !important;
    text-decoration: none;
    text-shadow: 0 4px 22px rgba(61, 15, 95, 0.42);
}

.blog-post-entry h4,
.blog-post-title,
.blog-post-entry h4 a {
    color: #fff1ff !important;
}

.calendar-title,
.archive-title,
.sidebar-box-title,
.blog-box-title {
    color: #f8efff !important;
    text-shadow: 0 0 12px rgba(234, 198, 255, 0.12);
}

.page-top-align {
    margin-top: 250px;
}

.calendar-box,
.archive-box,
.sidebar-box,
.live-analytics-widget,
.live-analytics-widget .sidebar-box,
.blog-post-entry,
.comment-body,
.blog-profile-panel {
    background: rgba(33, 12, 56, 0.08) !important;
    border: 1px solid rgba(255, 255, 255, 0.08) !important;
    border-radius: 18px;
    box-shadow: 0 0 16px rgba(211, 149, 255, 0.05) !important;
    backdrop-filter: blur(7px) saturate(116%);
    -webkit-backdrop-filter: blur(7px) saturate(116%);
}

.blog-post-entry {
    background: rgba(33, 12, 56, 0.09) !important;
    border: 1px solid rgba(255, 255, 255, 0.08) !important;
}

.blog-main-left-column > .page-top-align,
.blog-main-right-column > .page-top-align,
.blog-posts-shell {
    position: relative;
}

.blog-main-left-column > .page-top-align::before,
.blog-main-right-column > .page-top-align::before,
.blog-posts-shell::before {
    content: "";
    position: absolute;
    top: 0;
    border-radius: 24px;
    background: linear-gradient(
        to bottom,
        rgba(22, 8, 36, 0.36) 0%,
        rgba(44, 18, 72, 0.22) 26%,
        rgba(82, 36, 126, 0.10) 58%,
        rgba(126, 66, 184, 0.03) 82%,
        rgba(126, 66, 184, 0.00) 100%
    );
    border: 1px solid rgba(255, 255, 255, 0.07);
    box-shadow: 0 8px 24px rgba(20, 6, 34, 0.10);
    pointer-events: none;
    z-index: 0;
}

.blog-main-left-column > .page-top-align::before,
.blog-main-right-column > .page-top-align::before {
    width: min(100%, 260px);
    height: clamp(250px, 34vh, 330px);
}

.blog-main-left-column > .page-top-align::before {
    right: 0;
}

.blog-main-right-column > .page-top-align::before {
    left: 0;
}

.blog-posts-shell::before {
    left: 10px;
    right: 10px;
    height: clamp(235px, 30vh, 315px);
}

.blog-main-left-column > .page-top-align > *,
.blog-main-right-column > .page-top-align > *,
.blog-posts-shell > * {
    position: relative;
    z-index: 1;
}

.blog-post-entry:first-child,
.blog-main-left-column > .page-top-align > :first-child,
.blog-main-right-column > .page-top-align > :first-child {
    border-top: 1px solid rgba(255, 255, 255, 0.12) !important;
}

.live-analytics-widget {
    background: rgba(33, 12, 56, 0.08) !important;
    border: 1px solid rgba(255, 255, 255, 0.08) !important;
}

.archive-box,
.sidebar-box,
.live-analytics-widget .sidebar-box,
.comment-body {
    background: rgba(33, 12, 56, 0.08) !important;
    border-color: rgba(255, 255, 255, 0.08) !important;
}

.calendar-box,
.archive-box,
.sidebar-box,
.live-analytics-widget,
.blog-profile-panel {
    width: 100%;
    max-width: 260px;
}


.blog-post-entry,
.calendar-box,
.archive-box,
.sidebar-box,
.live-analytics-widget,
.blog-profile-panel,
.comment-body,
.blog-date-shell {
    position: relative;
    overflow: hidden;
}

.blog-post-entry::after,
.calendar-box::after,
.archive-box::after,
.sidebar-box::after,
.live-analytics-widget::after,
.blog-profile-panel::after,
.comment-body::after {
    content: '';
    position: absolute;
    inset: 0;
    pointer-events: none;
    background-image:
        radial-gradient(circle at 84% 18%, rgba(255, 222, 126, 0.26) 0 1.1px, transparent 2.2px),
        radial-gradient(circle at 89% 11%, rgba(255, 235, 171, 0.20) 0 0.9px, transparent 2px),
        radial-gradient(circle at 80% 26%, rgba(255, 213, 97, 0.18) 0 0.8px, transparent 1.9px);
    opacity: 0.62;
}

.calendar-box {
    padding: 16px;
    margin-left: auto;
}

.archive-box,
.sidebar-box,
.live-analytics-widget,
.blog-profile-panel {
    padding: 0;
}

.archive-box,
.blog-profile-panel {
    margin-left: auto;
}

.sidebar-box {
    margin-top: 0;
}

.sidebar-left-align {
    margin-left: auto;
    margin-right: 0;
}

.sidebar-right-align {
    margin-right: auto;
    margin-left: 0;
}

.blog-main-left-column > .page-top-align > * + *,
.blog-main-right-column > .page-top-align > * + * {
    margin-top: 18px !important;
    padding-top: 18px;
    border-top: 1px solid rgba(255, 255, 255, 0.12) !important;
}

.blog-main-left-column .archive-box,
.blog-main-left-column .calendar-box,
.blog-main-left-column .sidebar-box,
.blog-main-right-column .blog-profile-panel,
.blog-main-right-column .sidebar-box,
.blog-main-right-column .live-analytics-widget {
    position: relative;
}

.archive-title,
.sidebar-box-title {
    padding: 14px 16px 12px;
    margin: 0;
    border-bottom: 1px solid transparent;
    background: transparent !important;
}

.archive-title::after,
.sidebar-box-title::after,
.calendar-title::after,
.blog-post-entry hr::after {
    content: none !important;
    display: none !important;
}

.archive-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding: 14px 16px 16px;
}

.archive-link {
    color: rgba(247, 236, 255, 0.94);
    text-decoration: none;
    font-size: 13px;
    line-height: 1.3;
    padding: 8px 10px;
    border-radius: 10px;
    border: 1px solid rgba(255, 255, 255, 0.08);
    background: rgba(255, 255, 255, 0.03);
}

.archive-link:hover {
    color: #ffffff;
    border-color: rgba(255, 255, 255, 0.16);
    background: rgba(255, 255, 255, 0.06);
}

.archive-empty,
.sidebar-box-content {
    color: rgba(243, 232, 255, 0.88);
}

.sidebar-box-content {
    padding: 14px 16px 16px;
    font-size: 13px;
    line-height: 1.6;
}

.sidebar-box-content a {
    color: #f6c7ff !important;
}

.calendar-title {
    text-align: center;
    font-size: 14px;
    margin-bottom: 12px;
    letter-spacing: 0.08em;
}

.calendar-weekdays {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    text-align: center;
    font-size: 11px;
    color: rgba(243, 232, 255, 0.66);
    margin-bottom: 8px;
}

.calendar-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 6px;
    text-align: center;
    font-size: 12px;
}

.calendar-day {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 34px;
    text-decoration: none;
    background: rgba(255, 255, 255, 0.03);
    color: #f7eeff;
    border: 1px solid rgba(255, 255, 255, 0.10);
    border-radius: 10px;
}

.calendar-day:hover {
    color: #ffffff;
    border-color: rgba(255, 255, 255, 0.18);
    background: rgba(255, 255, 255, 0.07);
}

.calendar-day-has-post {
    border: 1px solid rgba(243, 176, 255, 0.58);
    color: #fff5ff;
    font-weight: 700;
}

.calendar-day-today {
    background: rgba(255, 255, 255, 0.12);
    border: 1px solid rgba(243, 176, 255, 0.82);
    color: #ffffff;
    font-weight: 800;
    position: relative;
    z-index: 1;
    box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.72) inset, 0 0 0 2px rgba(243, 176, 255, 0.12);
    transform: translateY(-1px) scale(1.04);
}

.blog-posts-shell {
    max-width: min(980px, calc(100vw - 34px));
    margin-left: auto;
    margin-right: auto;
    padding-left: 10px;
    padding-right: 10px;
}

.blog-post-entry {
    padding: 24px 26px;
}

.blog-post-entry hr {
    border-color: rgba(255, 255, 255, 0.12);
}

.blog-post-entry > .mt-4,
.blog-post-entry p,
.blog-post-entry li,
.blog-post-entry blockquote,
.blog-post-entry div,
.blog-post-entry span,
.blog-post-entry strong,
.blog-post-entry em {
    color: inherit;
}

.blog-post-entry img,
.blog-post-entry video,
.blog-post-entry iframe {
    border-radius: 18px;
    overflow: hidden;
}

.blog-post-entry iframe {
    width: 100%;
    min-height: 420px;
}

.blog-post-entry a {
    color: #f6c7ff;
}

.post-meta {
    font-size: 11px;
    line-height: 1.35;
    color: rgba(243, 232, 255, 0.74);
}

.post-meta-category,
.post-meta-tag,
.post-meta a {
    color: rgba(255, 241, 255, 0.90);
}

.post-meta a:hover {
    color: #ffffff;
}

.post-meta-sep {
    color: rgba(243, 232, 255, 0.36);
}

.blog-date-shell {
    position: relative;
    min-width: 86px;
    padding: 16px 12px 12px;
    border-radius: 22px;
    background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.16) 0%, rgba(255, 255, 255, 0.06) 46%, rgba(255, 255, 255, 0.02) 100%),
        linear-gradient(180deg, rgba(94, 46, 136, 0.34) 0%, rgba(45, 18, 71, 0.22) 100%);
    border: 1px solid rgba(255, 255, 255, 0.14);
    box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.14),
        0 12px 28px rgba(18, 6, 31, 0.22);
    backdrop-filter: blur(10px) saturate(118%);
    -webkit-backdrop-filter: blur(10px) saturate(118%);
    overflow: hidden;
}

.blog-date-shell::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 50% 10%, rgba(255, 248, 255, 0.24) 0%, rgba(255, 248, 255, 0.08) 28%, rgba(255, 248, 255, 0.00) 62%);
    pointer-events: none;
}

.blog-date-shell::after {
    content: '✦';
    position: absolute;
    top: 8px;
    left: 11px;
    font-size: 10px;
    line-height: 1;
    color: rgba(255, 242, 255, 0.86);
    text-shadow: 0 0 10px rgba(255, 216, 255, 0.35);
    pointer-events: none;
}

.blog-date-day,
.blog-date-month,
.blog-date-year {
    position: relative;
    z-index: 1;
}

.blog-date-day {
    font-size: 34px;
    line-height: 0.9;
    font-weight: 700;
    letter-spacing: -0.03em;
    color: #fff2ff !important;
    text-shadow: 0 0 16px rgba(255, 219, 255, 0.18);
    background: none !important;
    -webkit-background-clip: border-box !important;
    background-clip: border-box !important;
    -webkit-text-fill-color: currentColor !important;
}

.blog-date-month {
    margin-top: 7px;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    font-weight: 700;
    color: rgba(231, 206, 255, 0.86) !important;
    background: none !important;
    -webkit-background-clip: border-box !important;
    background-clip: border-box !important;
    -webkit-text-fill-color: currentColor !important;
}

.blog-date-year {
    margin-top: 2px;
    font-size: 11px;
    color: rgba(247, 239, 255, 0.74);
}

.post-actions a,
.post-actions span,
.post-author-link,
.comment-author a,
.post-views,
.blog-user-dropdown-toggle {
    color: #f6c7ff !important;
}

.post-actions a:hover,
.post-author-link:hover,
.comment-author a:hover,
.post-views:hover,
.blog-user-dropdown-toggle:hover {
    color: #ffffff !important;
}

.comment-body {
    padding: 10px 44px 10px 12px;
    border-radius: 14px;
}

.comment-text,
.comment-time,
.comment-author a {
    color: #f4eaff;
}

textarea.form-control,
input.form-control,
select.form-select {
    background: rgba(255, 255, 255, 0.10) !important;
    color: #fff3ff !important;
    border: 1px solid rgba(255, 255, 255, 0.14) !important;
    box-shadow: none !important;
}

textarea.form-control::placeholder,
input.form-control::placeholder {
    color: rgba(243, 232, 255, 0.52) !important;
}

textarea.form-control:focus,
input.form-control:focus,
select.form-select:focus {
    border-color: rgba(243, 176, 255, 0.58) !important;
    box-shadow: none !important;
}

.blog-action-outline,
.btn-outline-light {
    border-color: rgba(243, 176, 255, 0.32) !important;
    color: #fff3ff !important;
    background: rgba(255, 255, 255, 0.10) !important;
    box-shadow: none !important;
}

.blog-action-outline:hover,
.btn-outline-light:hover {
    border-color: rgba(243, 176, 255, 0.58) !important;
    color: #ffffff !important;
    background: rgba(255, 255, 255, 0.18) !important;
}

.progress {
    background: rgba(255, 255, 255, 0.12);
    border: 1px solid rgba(255, 255, 255, 0.10);
}

.progress-bar {
    background: linear-gradient(90deg, rgba(255, 201, 247, 0.84), rgba(178, 105, 255, 0.92));
}

@media (max-width: 991.98px) {
    body::before {
        height: clamp(380px, 82vw, 660px);
        background-size: cover, cover, cover;
    }

    body::after {
        height: clamp(360px, 76vw, 600px);
        opacity: 0.42;
    }

    .blog-header-wrap,
    .blog-main-layout-row {
        max-width: calc(100vw - 20px);
    }

    .page-top-align {
        margin-top: 42px;
    }

    .calendar-box,
    .archive-box,
    .sidebar-box,
    .live-analytics-widget,
    .blog-profile-panel,
    .blog-posts-shell {
        max-width: none;
    }
}

@media (max-width: 767.98px) {
    body::after {
        opacity: 0.34;
    }

    .page-top-align {
        margin-top: 24px;
    }

    .blog-post-entry iframe {
        min-height: 240px;
    }

    .blog-date-shell {
        min-width: 74px;
        padding: 13px 9px 10px;
        border-radius: 18px;
    }

    .blog-date-shell::after {
        top: 7px;
        left: 9px;
    }

    .blog-date-day {
        font-size: 28px;
    }

    .blog-date-month {
        letter-spacing: 0.14em;
    }
}
