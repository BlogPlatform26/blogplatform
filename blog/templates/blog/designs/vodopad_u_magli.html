{% extends "blog/layouts/blog_design_base.html" %}
{% load static %}

{% block content %}
    {% include "blog/components/blog_design_styles.html" %}
    <style>
body {
    background: #f2f1ed;
    color: var(--body-text-color, #465042);
    position: relative;
    min-height: 100vh;
    --analytics-stat-card-bg: rgba(255,255,255,0.48);
    --analytics-stat-card-border: rgba(124,137,124,0.26);
    --analytics-stat-card-color: #465042;
    --analytics-stat-value-color: #384236;
    --analytics-stat-label-color: rgba(70,80,66,0.76);
    --analytics-stat-card-shadow: none;
    --analytics-page-row-bg: rgba(255,255,255,0.34);
    --analytics-page-row-border: rgba(124,137,124,0.2);
    --analytics-page-row-color: #465042;
    --analytics-map-card-bg: rgba(255,255,255,0.34);
    --analytics-map-card-border: rgba(124,137,124,0.22);
    --analytics-map-card-shadow: none;
}

body::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: clamp(520px, 60vw, 980px);
    pointer-events: none;
    z-index: 0;
    background-image:
        linear-gradient(to bottom, rgba(242,241,237,0.10) 0%, rgba(242,241,237,0.16) 34%, rgba(242,241,237,0.34) 54%, rgba(242,241,237,0.66) 76%, #f2f1ed 100%),
        url('{% static "blog/images/design-backgrounds/vodopad_u_magli.png" %}');
    background-repeat: no-repeat, no-repeat;
    background-position: center top, center top;
    background-size: 100% 100%, 100% auto;
}

nav.navbar {
    position: relative;
    z-index: 4000 !important;
}

nav.navbar .dropdown-menu {
    z-index: 4100 !important;
}

.container-fluid.mt-3,
footer {
    position: relative;
    z-index: 2;
}

.blog-header-wrap,
.blog-main-layout-row {
    position: relative;
    z-index: 2;
    max-width: min(1560px, calc(100vw - 40px));
    margin-left: auto;
    margin-right: auto;
}

.blog-header-wrap > .row,
.blog-main-layout-row,
.blog-banner-strip > .row {
    --bs-gutter-x: 22px;
}

.blog-page-title,
.blog-page-title a {
    color: var(--blog-title-color, #364033) !important;
    text-decoration: none;
    text-shadow: 0 2px 14px rgba(255,255,255,0.36);
}

.blog-post-entry h4,
.blog-post-title,
.blog-post-entry h4 a {
    color: var(--post-title-color, #41503c) !important;
}

.calendar-title,
.archive-title,
.sidebar-box-title,
.blog-box-title {
    color: var(--box-title-color, #53634d) !important;
}

.blog-header-main {
    background: transparent !important;
    border: 0 !important;
    box-shadow: none !important;
    padding-top: 18px;
}

.blog-header-main,
.blog-header-main .blog-user-dropdown-toggle,
.blog-header-main .small,
.blog-header-main span,
.blog-header-main strong {
    color: var(--body-text-color, #465042) !important;
}

.page-top-align {
    margin-top: 260px;
}

.calendar-box,
.archive-box,
.sidebar-box,
.live-analytics-widget,
.live-analytics-widget .sidebar-box,
.blog-post-entry,
.comment-body {
    background: rgba(255,255,255,0.20) !important;
    border: 1px solid rgba(124, 137, 124, 0.30) !important;
    border-radius: 18px;
    box-shadow: none !important;
    backdrop-filter: blur(4px);
}

.calendar-box,
.archive-box,
.sidebar-box,
.live-analytics-widget {
    width: 100%;
    max-width: 260px;
}

.calendar-box {
    padding: 16px;
    margin-left: auto;
    background: rgba(255,255,255,0.26) !important;
    border-color: rgba(113, 130, 112, 0.34) !important;
}

.archive-box,
.sidebar-box,
.live-analytics-widget {
    padding: 0;
}

.archive-box {
    margin-left: auto;
}

.sidebar-box {
    margin-top: 20px;
}

.sidebar-left-align {
    margin-left: auto;
    margin-right: 0;
}

.sidebar-right-align {
    margin-right: auto;
    margin-left: 0;
}

.archive-title,
.sidebar-box-title {
    padding: 14px 16px 12px;
    margin: 0;
    border-bottom: 1px solid rgba(124, 137, 124, 0.22);
    background: transparent !important;
}

.calendar-title {
    text-align: center;
    font-size: 15px;
    margin-bottom: 12px;
    letter-spacing: 0.12em;
    color: #4c5c46 !important;
    font-weight: 700;
}

.calendar-weekdays {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    text-align: center;
    font-size: 11px;
    color: rgba(70,80,66,0.78);
    margin-bottom: 8px;
    font-weight: 600;
}

.calendar-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 6px;
    text-align: center;
    font-size: 12px;
}

.calendar-day {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 34px;
    text-decoration: none;
    background: rgba(255,255,255,0.36);
    color: #485344;
    border: 1px solid rgba(124,137,124,0.20);
    border-radius: 10px;
}

.calendar-day:hover {
    color: #364034;
    border-color: rgba(124,137,124,0.38);
    background: rgba(255,255,255,0.48);
}

.calendar-day-has-post {
    border-color: rgba(124,137,124,0.36);
    background: rgba(245,248,242,0.62);
    color: #42503c;
    font-weight: 700;
}

.calendar-day-today {
    background: rgba(221, 230, 214, 0.98);
    background-image: none;
    border-color: rgba(113,130,112,0.82);
    color: #2f382d;
    font-weight: 800;
    position: relative;
    z-index: 1;
    box-shadow: 0 0 0 2px rgba(255,255,255,0.86), 0 0 0 5px rgba(113,130,112,0.16), 0 10px 20px rgba(83,96,82,0.16);
    transform: translateY(-1px) scale(1.04);
}

.archive-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding: 14px 16px 16px;
}

.archive-link {
    color: #4d5849;
    text-decoration: none;
    font-size: 13px;
    line-height: 1.2;
    padding: 8px 10px;
    border-radius: 10px;
    background: rgba(255,255,255,0.26);
    border: 1px solid rgba(124,137,124,0.16);
}

.archive-link:hover {
    color: #394437;
    border-color: rgba(124,137,124,0.34);
    background: rgba(255,255,255,0.40);
}

.archive-empty,
.sidebar-box-content,
.post-meta,
.post-author-line,
.comment-text,
.comment-time {
    color: var(--body-text-color, #465042);
}

.sidebar-box-content,
.live-analytics-widget .sidebar-box-content {
    padding: 14px 16px 16px;
    font-size: 13px;
    line-height: 1.68;
}

.blog-post-entry {
    padding: 24px 26px;
    background: rgba(255,255,255,0.22) !important;
}

.blog-post-entry hr {
    border-color: rgba(124,137,124,0.16);
}

.comment-body {
    padding: 10px 44px 10px 12px;
}

textarea.form-control {
    background: rgba(255,255,255,0.30) !important;
    color: #465042 !important;
    border: 1px solid rgba(124,137,124,0.28) !important;
    border-radius: 12px;
}

textarea.form-control:focus {
    background: rgba(255,255,255,0.36) !important;
    color: #465042 !important;
    border-color: rgba(113,130,112,0.45) !important;
    box-shadow: none !important;
}

textarea::placeholder {
    color: rgba(70,80,66,0.52) !important;
}

.blog-action-outline,
.btn-outline-light {
    border-color: rgba(113,130,112,0.36) !important;
    color: #4f5d4a !important;
    background: rgba(255,255,255,0.16) !important;
}

.blog-action-outline:hover,
.btn-outline-light:hover {
    background-color: rgba(221,230,214,0.38) !important;
    color: #364034 !important;
}

.blog-date-day {
    font-size: 30px;
    font-weight: 700;
    color: var(--post-date-color, #657b63);
    letter-spacing: 0.01em;
}

.blog-date-month {
    color: #698065;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    font-weight: 700;
}

.blog-date-year,
.post-meta-sep {
    color: rgba(70,80,66,0.72);
}

.post-author-link,
.comment-author a,
.post-views,
.blog-user-dropdown-toggle,
.archive-link,
.sidebar-box-content a {
    color: #53634d !important;
}

.post-author-link:hover,
.comment-author a:hover,
.post-views:hover,
.blog-user-dropdown-toggle:hover,
.archive-link:hover,
.sidebar-box-content a:hover {
    color: #374135 !important;
}

@media (max-width: 991.98px) {
    body::before {
        height: clamp(360px, 82vw, 640px);
        background-size: cover, cover;
    }

    .blog-header-wrap,
    .blog-main-layout-row {
        max-width: calc(100vw - 20px);
    }

    .calendar-box,
    .archive-box,
    .sidebar-box,
    .live-analytics-widget {
        max-width: none;
    }

    .page-top-align {
        margin-top: 42px;
    }
}
    </style>
    {% include "blog/components/blog_posts.html" %}
{% endblock %}
