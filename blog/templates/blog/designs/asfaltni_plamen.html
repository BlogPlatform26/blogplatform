{% extends "blog/layouts/blog_design_base.html" %}
{% load static %}

{% block content %}
    {% include "blog/components/blog_design_styles.html" %}
    <style>
body {
    background: #17110d;
    color: #efe1d2;
    min-height: 100vh;
    position: relative;
    --analytics-stat-card-bg: rgba(24, 17, 13, 0.24);
    --analytics-stat-card-border: rgba(221, 160, 101, 0.16);
    --analytics-stat-card-color: #efe1d2;
    --analytics-stat-value-color: #fff3e5;
    --analytics-stat-label-color: rgba(239, 225, 210, 0.72);
    --analytics-stat-card-shadow: none;
    --analytics-page-row-bg: rgba(24, 17, 13, 0.20);
    --analytics-page-row-border: rgba(221, 160, 101, 0.14);
    --analytics-page-row-color: #efe1d2;
    --analytics-map-card-bg: rgba(24, 17, 13, 0.20);
    --analytics-map-card-border: rgba(221, 160, 101, 0.14);
    --analytics-map-card-shadow: none;
}

body::before {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: clamp(520px, 66.5vw, 980px);
    pointer-events: none;
    z-index: 0;
    background-image:
        linear-gradient(
            to bottom,
            rgba(7, 6, 5, 0.00) 0%,
            rgba(10, 8, 7, 0.03) 26%,
            rgba(14, 11, 9, 0.12) 42%,
            rgba(18, 14, 11, 0.28) 56%,
            rgba(23, 17, 13, 0.56) 71%,
            rgba(23, 17, 13, 0.84) 85%,
            rgba(23, 17, 13, 0.97) 94%,
            #17110d 100%
        ),
        url('{% static "blog/images/design-backgrounds/asfaltni_plamen.png" %}');
    background-repeat: no-repeat, no-repeat;
    background-position: center top, center top;
    background-size: 100% 100%, 100% auto;
}

nav.navbar,
nav.navbar .dropdown-menu {
    z-index: 4000 !important;
}

.container-fluid.mt-3,
footer {
    position: relative;
    z-index: 2;
}

.container-fluid.mt-3 {
    margin-top: 0 !important;
    padding-top: 0 !important;
}

.blog-header-wrap,
.blog-main-layout-row {
    position: relative;
    z-index: 2;
    max-width: min(1500px, calc(100vw - 54px));
    margin-left: auto;
    margin-right: auto;
}

.blog-header-wrap > .row,
.blog-main-layout-row,
.blog-banner-strip > .row {
    --bs-gutter-x: 24px;
}

.blog-header-main {
    background: transparent !important;
    border: 0 !important;
    box-shadow: none !important;
    padding-top: 18px;
}

.blog-header-main,
.blog-header-main .blog-user-dropdown-toggle,
.blog-header-main .small,
.blog-header-main span,
.blog-header-main strong {
    color: #f6e8da !important;
    text-shadow: 0 4px 16px rgba(0, 0, 0, 0.50);
}

.blog-page-title,
.blog-page-title a {
    color: #fff5e9 !important;
    text-decoration: none;
    text-shadow: 0 7px 22px rgba(0, 0, 0, 0.48);
}

.page-top-align {
    margin-top: 248px;
}

.blog-post-entry,
.calendar-box,
.archive-box,
.sidebar-box,
.live-analytics-widget,
.comment-body {
    background: rgba(24, 17, 13, 0.20) !important;
    border: 1px solid rgba(221, 160, 101, 0.14) !important;
    border-radius: 18px;
    box-shadow: none !important;
    backdrop-filter: none;
    -webkit-backdrop-filter: none;
}

.blog-post-entry {
    padding: 22px 24px;
}

.blog-post-entry + .blog-post-entry {
    margin-top: 22px;
}

.calendar-box,
.archive-box,
.sidebar-box,
.live-analytics-widget {
    width: 100%;
    max-width: 260px;
}

.calendar-box {
    padding: 16px;
    margin-left: auto;
}

.archive-box,
.sidebar-box,
.live-analytics-widget {
    padding: 0;
}

.sidebar-box {
    margin-top: 20px;
}

.sidebar-left-align {
    margin-left: auto;
    margin-right: 0;
}

.sidebar-right-align {
    margin-right: auto;
    margin-left: 0;
}

.archive-title,
.sidebar-box-title {
    padding: 14px 16px 12px;
    margin: 0;
    background: transparent !important;
    border-bottom: 1px solid rgba(221, 160, 101, 0.10);
}

.archive-title::after,
.sidebar-box-title::after,
.calendar-title::after,
.blog-post-entry hr::after {
    content: none !important;
    display: none !important;
}

.archive-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding: 14px 16px 16px;
}

.archive-link {
    color: rgba(255, 241, 226, 0.84);
    text-decoration: none;
    font-size: 13px;
    line-height: 1.3;
    padding: 8px 10px;
    border-radius: 10px;
    border: 1px solid rgba(221, 160, 101, 0.08);
    background: rgba(255, 255, 255, 0.02);
}

.archive-link:hover {
    color: #fff7ef;
    border-color: rgba(221, 160, 101, 0.22);
}

.archive-empty,
.sidebar-box-content,
.calendar-title,
.calendar-weekdays,
.post-meta,
.comment-time,
.small,
.text-muted {
    color: rgba(239, 225, 210, 0.72) !important;
}

.calendar-title,
.archive-title,
.sidebar-box-title,
.blog-box-title {
    color: #e2b37a !important;
}

.blog-post-entry,
.blog-post-entry p,
.blog-post-entry div,
.blog-post-entry li,
.blog-post-entry span,
.blog-post-entry strong,
.blog-post-entry em {
    color: #f0e4d7;
}

.blog-post-entry h4,
.blog-post-title,
.blog-post-entry h4 a {
    color: #fff4ea !important;
}

.comment-author a,
.sidebar-box-content a,
a {
    color: #efc792;
}

a:hover {
    color: #ffe1bd;
}

.btn-outline-light {
    border-color: rgba(239, 199, 146, 0.38) !important;
    color: #ffe1bd !important;
}

.btn-outline-light:hover {
    background: rgba(239, 199, 146, 0.12) !important;
    color: #fff6ec !important;
}

.post-meta-category,
.home-post-meta-category {
    color: rgba(255, 224, 190, 0.82) !important;
}

.post-meta-tag,
.home-post-meta-tag {
    color: rgba(239, 225, 210, 0.70) !important;
}

.blog-post-entry hr {
    border: 0;
    border-top: 1px solid rgba(221, 160, 101, 0.14);
    margin: 28px 0 0;
    opacity: 1;
}

.blog-date-day {
    background: none !important;
    -webkit-text-fill-color: #e6b170 !important;
    color: #e6b170 !important;
    font-size: 28px;
    font-weight: 700;
    line-height: 1;
}

.blog-date-month {
    background: none !important;
    -webkit-text-fill-color: rgba(246, 232, 218, 0.82) !important;
    color: rgba(246, 232, 218, 0.82) !important;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
}

.blog-date-year {
    color: rgba(246, 232, 218, 0.56) !important;
    font-size: 11px;
}

.calendar-box {
    background: rgba(24, 17, 13, 0.20) !important;
}

.calendar-grid {
    gap: 7px;
}

.calendar-day {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 34px;
    text-decoration: none;
    border-radius: 8px;
    background: rgba(63, 39, 27, 0.46) !important;
    color: rgba(252, 243, 233, 0.86) !important;
    border: 1px solid rgba(221, 160, 101, 0.08) !important;
    box-shadow: none !important;
}

.calendar-day:hover {
    color: #fff4ea !important;
    border-color: rgba(221, 160, 101, 0.20) !important;
    background: rgba(78, 48, 33, 0.52) !important;
}

.calendar-day-has-post {
    border-color: rgba(221, 160, 101, 0.22) !important;
    background: rgba(78, 48, 33, 0.54) !important;
}

.calendar-day-today {
    background: rgba(194, 124, 58, 0.80) !important;
    color: #fff6ed !important;
    border-color: rgba(255, 226, 194, 0.26) !important;
    font-weight: 700;
}

.comment-body {
    padding: 10px 44px 10px 12px;
}

textarea.form-control,
input.form-control,
select.form-select {
    background: rgba(33, 23, 18, 0.64) !important;
    color: #f6e8da !important;
    border-color: rgba(221, 160, 101, 0.18) !important;
}

textarea.form-control::placeholder,
input.form-control::placeholder {
    color: rgba(246, 232, 218, 0.56) !important;
}

@media (max-width: 991px) {
    body::before {
        height: min(74vw, 460px);
        background-size: 100% 100%, 100% auto;
    }

    .blog-header-wrap,
    .blog-main-layout-row {
        max-width: calc(100vw - 24px);
    }

    .page-top-align {
        margin-top: 210px;
    }
}
    </style>
    {% include "blog/components/blog_posts.html" %}
{% endblock %}
