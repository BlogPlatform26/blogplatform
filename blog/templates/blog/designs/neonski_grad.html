{% extends "blog/layouts/blog_design_base.html" %}
{% load static %}

{% block content %}
    {% include "blog/components/blog_design_styles.html" %}
    <style>
body {
    background: #17082f;
    color: #f0e4ff;
    position: relative;
    min-height: 100vh;
    --analytics-stat-card-bg: rgba(11, 8, 30, 0.48);
    --analytics-stat-card-border: rgba(149, 125, 255, 0.18);
    --analytics-stat-card-color: #f3eaff;
    --analytics-stat-value-color: #ffffff;
    --analytics-stat-label-color: rgba(240, 228, 255, 0.72);
    --analytics-stat-card-shadow: 0 18px 42px rgba(8, 6, 23, 0.34);
    --analytics-page-row-bg: rgba(11, 8, 30, 0.44);
    --analytics-page-row-border: rgba(149, 125, 255, 0.16);
    --analytics-page-row-color: #f1e7ff;
    --analytics-map-card-bg: rgba(11, 8, 30, 0.44);
    --analytics-map-card-border: rgba(149, 125, 255, 0.16);
    --analytics-map-card-shadow: 0 18px 42px rgba(8, 6, 23, 0.30);
}

body::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: clamp(520px, 60vw, 980px);
    pointer-events: none;
    z-index: 0;
    background-image:
        radial-gradient(circle at 50% 26%, rgba(95, 174, 255, 0.24) 0%, rgba(95, 174, 255, 0.10) 20%, rgba(95, 174, 255, 0.00) 42%),
        linear-gradient(to bottom, rgba(23, 8, 47, 0.00) 0%, rgba(28, 11, 58, 0.08) 30%, rgba(33, 13, 70, 0.28) 50%, rgba(25, 10, 54, 0.64) 72%, rgba(23, 8, 47, 0.92) 88%, #17082f 100%),
        url('{% static "blog/images/design-backgrounds/neonski_grad.jpg" %}');
    background-repeat: no-repeat, no-repeat, no-repeat;
    background-position: center top, center top, center top;
    background-size: 100% 100%, 100% 100%, 100% auto;
}

nav.navbar {
    position: relative;
    z-index: 4000 !important;
}

nav.navbar .dropdown-menu {
    z-index: 4100 !important;
}

.container-fluid.mt-3,
footer {
    position: relative;
    z-index: 2;
}

.blog-header-wrap,
.blog-main-layout-row {
    position: relative;
    z-index: 2;
    max-width: min(1560px, calc(100vw - 40px));
    margin-left: auto;
    margin-right: auto;
}

.blog-header-wrap > .row,
.blog-main-layout-row,
.blog-banner-strip > .row {
    --bs-gutter-x: 24px;
}

.blog-header-main {
    background: transparent !important;
    border: 0 !important;
    box-shadow: none !important;
    padding-top: 18px;
}

.blog-header-main,
.blog-header-main .blog-user-dropdown-toggle,
.blog-header-main .small,
.blog-header-main span,
.blog-header-main strong {
    color: #f4eeff !important;
    text-shadow: 0 4px 18px rgba(9, 6, 25, 0.52);
}

.blog-page-title,
.blog-page-title a {
    color: #fff7ff !important;
    text-decoration: none;
    text-shadow: 0 8px 24px rgba(13, 8, 32, 0.60);
    letter-spacing: -0.02em;
}

.blog-post-entry h4,
.blog-post-title,
.blog-post-entry h4 a {
    color: #fff8ff !important;
}

.calendar-title,
.archive-title,
.sidebar-box-title,
.blog-box-title {
    color: #f1e7ff !important;
    letter-spacing: 0.02em;
}

.page-top-align {
    margin-top: 250px;
}

.calendar-box,
.archive-box,
.sidebar-box,
.live-analytics-widget,
.live-analytics-widget .sidebar-box,
.blog-post-entry,
.comment-body,
.blog-profile-panel {
    background: linear-gradient(180deg, rgba(17, 10, 39, 0.58), rgba(11, 8, 29, 0.46)) !important;
    border: 1px solid rgba(168, 135, 255, 0.18) !important;
    border-radius: 22px;
    box-shadow: 0 22px 54px rgba(7, 5, 20, 0.34), 0 0 0 1px rgba(255, 255, 255, 0.04) inset, 0 0 26px rgba(124, 79, 255, 0.10);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
}

.calendar-box,
.archive-box,
.sidebar-box,
.live-analytics-widget,
.blog-profile-panel {
    width: 100%;
    max-width: 270px;
}

.calendar-box {
    padding: 18px;
    margin-left: auto;
}

.archive-box,
.sidebar-box,
.live-analytics-widget,
.blog-profile-panel {
    padding: 0;
}

.archive-box,
.blog-profile-panel {
    margin-left: auto;
}

.sidebar-box {
    margin-top: 20px;
}

.sidebar-left-align {
    margin-left: auto;
    margin-right: 0;
}

.sidebar-right-align {
    margin-right: auto;
    margin-left: 0;
}

.archive-title,
.sidebar-box-title {
    padding: 14px 16px 12px;
    margin: 0;
    border-bottom: 1px solid rgba(168, 135, 255, 0.14);
    background: transparent !important;
}

.archive-title::after,
.sidebar-box-title::after,
.calendar-title::after,
.blog-post-entry hr::after {
    content: none !important;
    display: none !important;
}

.archive-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding: 14px 16px 16px;
}

.archive-link {
    color: rgba(244, 236, 255, 0.90);
    text-decoration: none;
    font-size: 13px;
    line-height: 1.3;
    padding: 10px 12px;
    border-radius: 12px;
    border: 1px solid rgba(168, 135, 255, 0.12);
    background: rgba(255, 255, 255, 0.03);
}

.archive-link:hover {
    color: #ffffff;
    border-color: rgba(224, 110, 255, 0.34);
    box-shadow: 0 0 0 1px rgba(224, 110, 255, 0.10) inset;
}

.archive-empty,
.sidebar-box-content {
    color: rgba(240, 228, 255, 0.84);
}

.sidebar-box-content {
    padding: 14px 16px 16px;
    font-size: 13px;
    line-height: 1.6;
}

.sidebar-box-content a {
    color: #8de4ff !important;
}

.calendar-title {
    text-align: center;
    font-size: 14px;
    margin-bottom: 12px;
    letter-spacing: 0.10em;
}

.calendar-weekdays {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    text-align: center;
    font-size: 11px;
    color: rgba(240, 228, 255, 0.62);
    margin-bottom: 8px;
}

.calendar-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 6px;
    text-align: center;
    font-size: 12px;
}

.calendar-day {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 34px;
    text-decoration: none;
    background: rgba(255, 255, 255, 0.03);
    color: #f2e9ff;
    border: 1px solid rgba(168, 135, 255, 0.14);
    border-radius: 12px;
}

.calendar-day:hover {
    color: #ffffff;
    border-color: rgba(224, 110, 255, 0.34);
}

.calendar-day-has-post {
    border-color: rgba(113, 234, 255, 0.30);
    box-shadow: 0 0 0 1px rgba(113, 234, 255, 0.08) inset;
    font-weight: 700;
}

.calendar-day-today {
    background: linear-gradient(135deg, rgba(255, 88, 212, 0.26), rgba(90, 208, 255, 0.22));
    border-color: rgba(225, 163, 255, 0.78);
    color: #ffffff;
    font-weight: 800;
    position: relative;
    z-index: 1;
    box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.52) inset, 0 0 20px rgba(118, 98, 255, 0.22), 0 10px 24px rgba(7, 5, 20, 0.28);
    transform: translateY(-1px) scale(1.04);
}

.blog-posts-shell {
    max-width: min(980px, calc(100vw - 34px));
    margin-left: auto;
    margin-right: auto;
    padding-left: 10px;
    padding-right: 10px;
}

.blog-post-entry {
    padding: 26px 28px;
}

.blog-post-entry hr {
    border-color: rgba(168, 135, 255, 0.16);
}

.blog-post-entry > .mt-4,
.blog-post-entry p,
.blog-post-entry li,
.blog-post-entry blockquote,
.blog-post-entry div,
.blog-post-entry span,
.blog-post-entry strong,
.blog-post-entry em {
    color: inherit;
}

.blog-post-entry img,
.blog-post-entry video,
.blog-post-entry iframe {
    border-radius: 18px;
    overflow: hidden;
    box-shadow: 0 16px 42px rgba(7, 5, 20, 0.24);
}

.blog-post-entry iframe {
    width: 100%;
    min-height: 420px;
}

.blog-post-entry a {
    color: #8de4ff;
}

.post-meta {
    font-size: 11px;
    line-height: 1.35;
    color: rgba(240, 228, 255, 0.66);
}

.post-meta-category,
.post-meta-tag,
.post-meta a {
    color: rgba(240, 228, 255, 0.84);
}

.post-meta a:hover {
    color: #ffffff;
}

.post-meta-sep {
    color: rgba(240, 228, 255, 0.34);
}

.blog-date-shell {
    min-width: 92px;
    padding: 13px 10px 11px;
    border-radius: 20px;
    background: linear-gradient(180deg, rgba(255, 255, 255, 0.10), rgba(255, 255, 255, 0.04));
    border: 1px solid rgba(171, 146, 255, 0.24);
    box-shadow: 0 10px 28px rgba(7, 5, 20, 0.22), 0 0 16px rgba(111, 90, 255, 0.10);
}

.blog-date-day {
    font-size: 31px;
    font-weight: 800;
    color: #fffaff !important;
    background: none !important;
    -webkit-background-clip: border-box !important;
    background-clip: border-box !important;
    -webkit-text-fill-color: currentColor !important;
}

.blog-date-month {
    color: rgba(126, 232, 255, 0.84) !important;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    font-weight: 700;
    margin-top: 4px;
    background: none !important;
    -webkit-background-clip: border-box !important;
    background-clip: border-box !important;
    -webkit-text-fill-color: currentColor !important;
}

.blog-date-year {
    color: rgba(240, 228, 255, 0.58);
}

.post-actions a,
.post-actions span,
.post-author-link,
.comment-author a,
.post-views,
.blog-user-dropdown-toggle {
    color: #d6c4ff !important;
}

.post-actions a:hover,
.post-author-link:hover,
.comment-author a:hover,
.post-views:hover,
.blog-user-dropdown-toggle:hover {
    color: #ffffff !important;
}

.comment-body {
    padding: 10px 44px 10px 12px;
}

.comment-text,
.comment-time,
.comment-author a {
    color: #f0e4ff;
}

textarea.form-control,
input.form-control,
select.form-select {
    background: rgba(255, 255, 255, 0.03) !important;
    color: #f5edff !important;
    border: 1px solid rgba(168, 135, 255, 0.18) !important;
    box-shadow: none !important;
}

textarea.form-control::placeholder,
input.form-control::placeholder {
    color: rgba(240, 228, 255, 0.42) !important;
}

textarea.form-control:focus,
input.form-control:focus,
select.form-select:focus {
    border-color: rgba(224, 110, 255, 0.36) !important;
    box-shadow: 0 0 0 0.18rem rgba(224, 110, 255, 0.10) !important;
}

.blog-action-outline,
.btn-outline-light {
    border-color: rgba(224, 110, 255, 0.34) !important;
    color: #f7f0ff !important;
    background: rgba(255, 255, 255, 0.03) !important;
    box-shadow: none !important;
}

.blog-action-outline:hover,
.btn-outline-light:hover {
    border-color: rgba(126, 232, 255, 0.52) !important;
    color: #ffffff !important;
    background: rgba(126, 232, 255, 0.10) !important;
}

.progress {
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(168, 135, 255, 0.12);
}

.progress-bar {
    background: linear-gradient(90deg, rgba(255, 97, 220, 0.82), rgba(96, 218, 255, 0.92));
}

.blog-profile-panel {
    padding: 14px 16px 16px !important;
}

.blog-profile-panel__name,
.blog-profile-panel__blog-name,
.blog-profile-panel__stats,
.blog-profile-panel__dropdown-toggle {
    text-shadow: 0 2px 10px rgba(0, 0, 0, 0.24);
}

.blog-profile-panel__avatar {
    box-shadow: 0 10px 24px rgba(7, 5, 20, 0.24), 0 0 14px rgba(126, 232, 255, 0.10);
}

.blog-profile-panel__follow-btn.btn-primary {
    background: linear-gradient(135deg, rgba(255, 88, 212, 0.92), rgba(94, 218, 255, 0.92)) !important;
    border: 0 !important;
    color: #ffffff !important;
    box-shadow: 0 10px 24px rgba(111, 90, 255, 0.18);
}

.blog-profile-panel__follow-btn.btn-outline-primary {
    border-color: rgba(224, 110, 255, 0.34) !important;
    color: #f7f0ff !important;
    background: rgba(255, 255, 255, 0.03) !important;
}

.blog-profile-panel__follow-btn.btn-outline-primary:hover {
    border-color: rgba(126, 232, 255, 0.52) !important;
    background: rgba(126, 232, 255, 0.10) !important;
}

@media (max-width: 991.98px) {
    body::before {
        height: clamp(360px, 82vw, 640px);
        background-size: cover, cover, cover;
    }

    .blog-header-wrap,
    .blog-main-layout-row {
        max-width: calc(100vw - 20px);
    }

    .page-top-align {
        margin-top: 42px;
    }

    .calendar-box,
    .archive-box,
    .sidebar-box,
    .live-analytics-widget,
    .blog-profile-panel,
    .blog-posts-shell {
        max-width: none;
    }
}

@media (max-width: 767.98px) {
    .page-top-align {
        margin-top: 24px;
    }

    .blog-post-entry {
        padding: 20px 18px;
        border-radius: 18px;
    }

    .blog-post-entry iframe {
        min-height: 240px;
    }

    .blog-date-shell {
        min-width: 78px;
        padding: 10px 8px;
    }

    .blog-date-day {
        font-size: 26px;
    }
}
    </style>
    {% include "blog/components/blog_posts.html" %}
{% endblock %}
