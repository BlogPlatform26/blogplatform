{% extends "blog/layouts/blog_design_base.html" %}
{% load static %}

{% block content %}
    {% include "blog/components/blog_design_styles.html" %}
    <style>
body {
    background: #f6f5f2;
    color: var(--body-text-color, #5f6975);
    position: relative;
    min-height: 100vh;
    --analytics-stat-card-bg: rgba(255,255,255,0.48);
    --analytics-stat-card-border: rgba(160,175,196,0.24);
    --analytics-stat-card-color: #5f6975;
    --analytics-stat-value-color: #51606f;
    --analytics-stat-label-color: rgba(95,105,117,0.72);
    --analytics-stat-card-shadow: 0 18px 42px rgba(170,182,198,0.12);
    --analytics-page-row-bg: rgba(255,255,255,0.40);
    --analytics-page-row-border: rgba(160,175,196,0.20);
    --analytics-page-row-color: #5f6975;
    --analytics-map-card-bg: rgba(255,255,255,0.42);
    --analytics-map-card-border: rgba(160,175,196,0.20);
    --analytics-map-card-shadow: 0 18px 42px rgba(170,182,198,0.10);
}

body::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: clamp(560px, 62vw, 1040px);
    pointer-events: none;
    z-index: 0;
    background-image:
        linear-gradient(to bottom, rgba(246,245,242,0.00) 0%, rgba(246,245,242,0.06) 24%, rgba(246,245,242,0.18) 42%, rgba(246,245,242,0.42) 58%, rgba(246,245,242,0.76) 78%, #f6f5f2 100%),
        url('{% static "blog/images/design-backgrounds/planine_u_magli.jpg" %}');
    background-repeat: no-repeat, no-repeat;
    background-position: center top, center top;
    background-size: 100% 100%, cover;
}

nav.navbar {
    position: relative;
    z-index: 4000 !important;
    background: rgba(23, 28, 36, 0.88) !important;
    backdrop-filter: blur(8px);
}

nav.navbar .dropdown-menu {
    z-index: 4100 !important;
}

.container-fluid.mt-3,
footer {
    position: relative;
    z-index: 2;
}

.blog-header-wrap,
.blog-main-layout-row {
    position: relative;
    z-index: 2;
    max-width: min(1560px, calc(100vw - 40px));
    margin-left: auto;
    margin-right: auto;
}

.blog-header-wrap > .row,
.blog-main-layout-row,
.blog-banner-strip > .row {
    --bs-gutter-x: 24px;
}

.blog-page-title,
.blog-page-title a {
    color: var(--blog-title-color, #5b6877) !important;
    text-decoration: none;
    text-shadow: 0 2px 18px rgba(255,255,255,0.66);
}

.blog-post-entry h4,
.blog-post-title,
.blog-post-entry h4 a {
    color: var(--post-title-color, #617181) !important;
}

.calendar-title,
.archive-title,
.sidebar-box-title,
.blog-box-title {
    color: var(--box-title-color, #6c7d8f) !important;
}

.blog-header-main {
    background: transparent !important;
    border: 0 !important;
    box-shadow: none !important;
    padding-top: 18px;
}

.blog-header-main,
.blog-header-main .blog-user-dropdown-toggle,
.blog-header-main .small,
.blog-header-main span,
.blog-header-main strong {
    color: var(--body-text-color, #5f6975) !important;
}

.page-top-align {
    margin-top: 250px;
}

.calendar-box,
.archive-box,
.sidebar-box,
.live-analytics-widget,
.live-analytics-widget .sidebar-box,
.blog-post-entry,
.comment-body {
    background: rgba(255,255,255,0.42) !important;
    border: 1px solid rgba(160, 175, 196, 0.24) !important;
    border-radius: 20px;
    box-shadow: 0 18px 42px rgba(170, 182, 198, 0.12) !important;
    backdrop-filter: blur(9px);
}

.calendar-box,
.archive-box,
.sidebar-box,
.live-analytics-widget {
    width: 100%;
    max-width: 260px;
}

.calendar-box {
    padding: 18px;
    margin-left: auto;
}

.archive-box,
.sidebar-box,
.live-analytics-widget {
    padding: 0;
}

.archive-box {
    margin-left: auto;
}

.sidebar-box {
    margin-top: 20px;
}

.sidebar-left-align {
    margin-left: auto;
    margin-right: 0;
}

.sidebar-right-align {
    margin-right: auto;
    margin-left: 0;
}

.archive-title,
.sidebar-box-title {
    padding: 14px 16px 12px;
    margin: 0;
    border-bottom: 1px solid rgba(160, 175, 196, 0.18);
    background: transparent !important;
}



.archive-title::after,
.sidebar-box-title::after,
.calendar-title::after {
    content: none !important;
    display: none !important;
}

.calendar-day-has-post {
    background-image: none !important;
    background-clip: border-box !important;
}
.calendar-title {
    text-align: center;
    font-size: 15px;
    margin-bottom: 12px;
    letter-spacing: 0.14em;
    color: #708091 !important;
    font-weight: 700;
}

.calendar-weekdays {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    text-align: center;
    font-size: 11px;
    color: rgba(95,105,117,0.76);
    margin-bottom: 10px;
    font-weight: 600;
}

.calendar-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 7px;
    text-align: center;
    font-size: 12px;
}

.calendar-day {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 36px;
    text-decoration: none;
    background: rgba(255,255,255,0.56);
    color: #657383;
    border: 1px solid rgba(160,175,196,0.18);
    border-radius: 12px;
}

.calendar-day:hover {
    color: #4e5c6b;
    border-color: rgba(142,163,187,0.34);
    background: rgba(255,255,255,0.72);
}

.calendar-day-has-post {
    border-color: rgba(142,163,187,0.34);
    background: rgba(245,248,252,0.82);
    color: #56667a;
    font-weight: 700;
}

.calendar-day-today {
    background: rgba(226,234,244,0.98);
    background-image: none;
    border-color: rgba(142,163,187,0.82);
    color: #455364;
    font-weight: 800;
    position: relative;
    z-index: 1;
    box-shadow: 0 0 0 2px rgba(255,255,255,0.9), 0 0 0 5px rgba(142,163,187,0.16), 0 10px 20px rgba(111,126,145,0.16);
    transform: translateY(-1px) scale(1.04);
}

.archive-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding: 14px 16px 16px;
}

.archive-link {
    color: #647487;
    text-decoration: none;
    font-size: 13px;
    line-height: 1.2;
    padding: 8px 10px;
    border-radius: 12px;
    background: rgba(255,255,255,0.46);
    border: 1px solid rgba(160,175,196,0.14);
}

.archive-link:hover {
    color: #4e5d6c;
    border-color: rgba(142,163,187,0.30);
    background: rgba(255,255,255,0.66);
}

.archive-empty,
.sidebar-box-content,
.post-meta,
.post-author-line,
.comment-text,
.comment-time {
    color: var(--body-text-color, #5f6975);
}

.sidebar-box-content,
.live-analytics-widget .sidebar-box-content {
    padding: 14px 16px 16px;
    font-size: 13px;
    line-height: 1.68;
}

.blog-post-entry {
    padding: 24px 26px;
}

.blog-post-entry hr {
    border-color: rgba(160,175,196,0.16);
}

.comment-body {
    padding: 10px 44px 10px 12px;
    background: rgba(255,255,255,0.36) !important;
}

textarea.form-control {
    background: rgba(255,255,255,0.54) !important;
    color: #5f6975 !important;
    border: 1px solid rgba(160,175,196,0.24) !important;
    border-radius: 14px;
}

textarea.form-control:focus {
    background: rgba(255,255,255,0.72) !important;
    color: #5f6975 !important;
    border-color: rgba(142,163,187,0.42) !important;
    box-shadow: 0 0 0 0.14rem rgba(193,205,219,0.35) !important;
}

textarea::placeholder {
    color: rgba(95,105,117,0.52) !important;
}

.blog-action-outline,
.btn-outline-light {
    border-color: rgba(142,163,187,0.34) !important;
    color: #617181 !important;
    background: rgba(255,255,255,0.20) !important;
}

.blog-action-outline:hover,
.btn-outline-light:hover {
    background-color: rgba(230,237,245,0.62) !important;
    color: #4b5967 !important;
}

.blog-date-shell {
    min-width: 90px;
    padding: 12px 10px 10px;
    border-radius: 18px;
    background: rgba(255,255,255,0.54);
    border: 1px solid rgba(160,175,196,0.18);
    box-shadow: 0 16px 34px rgba(170,182,198,0.10);
}

.blog-date-day {
    font-size: 30px;
    font-weight: 700;
    color: var(--post-date-color, #8ea3bb) !important;
    letter-spacing: 0.01em;
    background: none !important;
    -webkit-background-clip: border-box !important;
    background-clip: border-box !important;
    -webkit-text-fill-color: currentColor !important;
}

.blog-date-month {
    color: #93a8be !important;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    font-weight: 700;
    margin-top: 4px;
    background: none !important;
    -webkit-background-clip: border-box !important;
    background-clip: border-box !important;
    -webkit-text-fill-color: currentColor !important;
}

.blog-date-year,
.post-meta-sep {
    color: rgba(95,105,117,0.70);
}

.post-author-link,
.comment-author a,
.post-views,
.blog-user-dropdown-toggle,
.archive-link,
.sidebar-box-content a {
    color: #70859d !important;
}

.post-author-link:hover,
.comment-author a:hover,
.post-views:hover,
.blog-user-dropdown-toggle:hover,
.archive-link:hover,
.sidebar-box-content a:hover {
    color: #53657a !important;
}

@media (max-width: 991.98px) {
    body::before {
        height: clamp(360px, 82vw, 660px);
        background-size: 100% 100%, cover;
    }

    .blog-header-wrap,
    .blog-main-layout-row {
        max-width: calc(100vw - 20px);
    }

    .calendar-box,
    .archive-box,
    .sidebar-box,
    .live-analytics-widget {
        max-width: none;
    }

    .page-top-align {
        margin-top: 40px;
    }
}
    </style>
    {% include "blog/components/blog_posts.html" %}
{% endblock %}
