{% extends "blog/layouts/blog_design_base.html" %}
{% load static %}

{% block blog_header %}
    <section class="nebesko-polje-hero">
        <div class="nebesko-polje-hero__inner">
            {% include "blog/components/blog_header.html" %}
        </div>
    </section>
{% endblock %}

{% block content %}
    {% include "blog/components/blog_design_styles.html" %}
    <style>
html,
body {
    overflow-x: clip;
}

body {
    background: #eef4ff;
    color: var(--body-text-color, #596472);
    position: relative;
    min-height: 100vh;
    --analytics-stat-card-bg: rgba(255, 255, 255, 0.34);
    --analytics-stat-card-border: rgba(132, 151, 176, 0.18);
    --analytics-stat-card-color: #5f6873;
    --analytics-stat-value-color: #4e5966;
    --analytics-stat-label-color: rgba(95, 104, 115, 0.72);
    --analytics-stat-card-shadow: 0 10px 24px rgba(109, 126, 150, 0.08);
    --analytics-page-row-bg: rgba(255, 255, 255, 0.30);
    --analytics-page-row-border: rgba(132, 151, 176, 0.16);
    --analytics-page-row-color: #5f6873;
    --analytics-map-card-bg: rgba(255, 255, 255, 0.26);
    --analytics-map-card-border: rgba(132, 151, 176, 0.16);
    --analytics-map-card-shadow: 0 10px 24px rgba(109, 126, 150, 0.08);
    --nebesko-panel-bg: {{ blog_preferences.active_design_customization.content_background_color|default:'rgba(255, 255, 255, 0.42)' }};
    --nebesko-panel-bg-strong: {{ blog_preferences.active_design_customization.box_background_color|default:'rgba(255, 255, 255, 0.52)' }};
    --nebesko-content-border: {{ blog_preferences.active_design_customization.content_border_color|default:'rgba(132, 151, 176, 0.22)' }};
    --nebesko-box-border: {{ blog_preferences.active_design_customization.box_border_color|default:'rgba(132, 151, 176, 0.24)' }};
    --nebesko-shadow: 0 16px 38px rgba(114, 131, 155, 0.10);
    --nebesko-link: #61748b;
    --nebesko-link-strong: #4d6279;
}

body::before {
    content: '';
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    background-image:
        linear-gradient(to bottom, rgba(255, 255, 255, 0.05) 0%, rgba(255, 255, 255, 0.12) 26%, rgba(237, 244, 255, 0.22) 60%, rgba(237, 244, 255, 0.34) 100%),
        url('{% static "blog/images/design-backgrounds/nebesko_polje_middle.png" %}');
    background-repeat: no-repeat;
    background-position: center top;
    background-size: cover;
}

nav.navbar {
    position: relative;
    z-index: 5000 !important;
}

nav.navbar .dropdown-menu {
    z-index: 5100 !important;
}

.container-fluid.mt-3,
.blog-main-layout-row,
.analytics-footer-slot,
footer {
    position: relative;
    z-index: 2;
}

.blog-main-layout-row {
    max-width: min(1560px, calc(100vw - 40px));
    margin-left: auto;
    margin-right: auto;
}

.blog-main-layout-row,
.blog-header-wrap > .row,
.blog-banner-strip > .row {
    --bs-gutter-x: 22px;
}

.nebesko-polje-hero {
    position: relative;
    isolation: isolate;
    z-index: 3;
    width: min(1560px, calc(100vw - 24px));
    margin: 6px auto 0;
    border-radius: 32px;
    overflow: hidden;
    background: rgba(255, 255, 255, 0.06);
    box-shadow: 0 28px 70px rgba(123, 138, 159, 0.16);
}

.nebesko-polje-hero::before {
    content: '';
    position: absolute;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    background:
        linear-gradient(to bottom, rgba(255, 255, 255, 0.02) 0%, rgba(255, 255, 255, 0.04) 34%, rgba(227, 236, 249, 0.16) 58%, rgba(218, 229, 248, 0.72) 86%, rgba(214, 226, 247, 0.96) 100%);
}

.nebesko-polje-hero::after {
    content: '';
    position: absolute;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    background-image:
        linear-gradient(to bottom, rgba(255, 255, 255, 0.06) 0%, rgba(255, 255, 255, 0.03) 18%, rgba(244, 247, 255, 0.08) 42%, rgba(233, 240, 251, 0.18) 68%, rgba(220, 230, 247, 0.26) 100%),
        url('{% static "blog/images/design-backgrounds/nebesko_polje_top.png" %}');
    background-repeat: no-repeat;
    background-position: center center;
    background-size: cover;
    -webkit-mask-image: linear-gradient(to bottom, #000 0%, #000 58%, rgba(0, 0, 0, 0.78) 74%, transparent 100%);
    mask-image: linear-gradient(to bottom, #000 0%, #000 58%, rgba(0, 0, 0, 0.78) 74%, transparent 100%);
}

.nebesko-polje-hero__inner {
    position: relative;
    z-index: 2;
    min-height: clamp(250px, 26vw, 360px);
    display: flex;
    align-items: flex-end;
    padding: clamp(78px, 10vw, 138px) 0 clamp(28px, 4vw, 46px);
}

.blog-header-wrap {
    width: 100%;
    max-width: none;
    margin: 0 auto;
}

.blog-header-main {
    background: transparent !important;
    border: 0 !important;
    box-shadow: none !important;
    padding-top: 0;
}

.blog-header-main,
.blog-header-main .blog-user-dropdown-toggle,
.blog-header-main .small,
.blog-header-main span,
.blog-header-main strong {
    color: #58616b !important;
    text-shadow: 0 3px 18px rgba(255, 255, 255, 0.78);
}

.blog-page-title,
.blog-page-title a {
    color: var(--blog-title-color, #505a65) !important;
    text-decoration: none;
    text-shadow: 0 3px 20px rgba(255, 255, 255, 0.88);
}

.blog-post-entry h4,
.blog-post-title,
.blog-post-entry h4 a {
    color: var(--post-title-color, #525d69) !important;
}

.calendar-title,
.archive-title,
.sidebar-box-title,
.blog-box-title {
    color: var(--box-title-color, #606b77) !important;
}

.blog-header-wrap .blog-banner {
    border: 1px solid rgba(255, 255, 255, 0.34);
    box-shadow: 0 14px 34px rgba(106, 123, 147, 0.14);
}

.page-top-align {
    margin-top: 26px;
}

.calendar-box,
.archive-box,
.sidebar-box,
.live-analytics-widget,
.live-analytics-widget .sidebar-box,
.blog-profile-panel,
.blog-post-entry,
.comment-body {
    border-radius: 20px;
    box-shadow: var(--nebesko-shadow) !important;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
}

.calendar-box,
.archive-box,
.sidebar-box,
.live-analytics-widget,
.live-analytics-widget .sidebar-box,
.blog-profile-panel {
    background: var(--nebesko-panel-bg-strong) !important;
    border: 1px solid var(--nebesko-box-border) !important;
}

.blog-post-entry,
.comment-body {
    background: var(--nebesko-panel-bg) !important;
    border: 1px solid var(--nebesko-content-border) !important;
}

.calendar-box,
.archive-box,
.sidebar-box,
.live-analytics-widget,
.blog-profile-panel {
    width: 100%;
    max-width: 260px;
}

.calendar-box {
    padding: 16px;
    margin-left: auto;
}

.archive-box,
.sidebar-box,
.live-analytics-widget {
    padding: 0;
}

.archive-box {
    margin-left: auto;
}

.sidebar-box,
.blog-profile-panel {
    margin-top: 20px;
}

.sidebar-left-align {
    margin-left: auto;
    margin-right: 0;
}

.sidebar-right-align {
    margin-right: auto;
    margin-left: 0;
}

.archive-title,
.sidebar-box-title {
    padding: 14px 16px 12px;
    margin: 0;
    border-bottom: 1px solid var(--nebesko-box-border);
    background: transparent !important;
}

.archive-title::after,
.sidebar-box-title::after,
.calendar-title::after,
.blog-post-entry hr::after {
    content: none !important;
    display: none !important;
}

.archive-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding: 14px 16px 16px;
}

.archive-link {
    color: rgba(89, 100, 114, 0.92);
    text-decoration: none;
    font-size: 13px;
    line-height: 1.3;
    padding: 8px 10px;
    border-radius: 10px;
    border: 1px solid var(--nebesko-box-border);
    background: rgba(255, 255, 255, 0.14);
}

.archive-link:hover {
    color: #4d5966;
    border-color: rgba(132, 151, 176, 0.34);
    background: rgba(255, 255, 255, 0.24);
}

.archive-empty,
.sidebar-box-content,
.blog-profile-panel__blog-name,
.blog-profile-panel__stats,
.blog-profile-panel__note {
    color: rgba(89, 100, 114, 0.86);
}

.sidebar-box-content {
    padding: 14px 16px 16px;
    font-size: 13px;
    line-height: 1.6;
}

.sidebar-box-content a,
.blog-profile-panel__name,
.blog-profile-panel__dropdown-toggle,
.post-author-link a,
.post-actions a,
.comment-author a,
#comments-detail a,
[id^='comments-'] a {
    color: var(--nebesko-link) !important;
}

.sidebar-box-content a:hover,
.blog-profile-panel__name:hover,
.post-author-link a:hover,
.post-actions a:hover,
.comment-author a:hover,
#comments-detail a:hover,
[id^='comments-'] a:hover {
    color: var(--nebesko-link-strong) !important;
}

.blog-profile-panel__avatar {
    box-shadow: 0 8px 20px rgba(114, 132, 156, 0.14);
}

.calendar-title {
    text-align: center;
    font-size: 14px;
    margin-bottom: 12px;
    letter-spacing: 0.08em;
}

.calendar-weekdays {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    text-align: center;
    font-size: 11px;
    color: rgba(89, 100, 114, 0.62);
    margin-bottom: 8px;
}

.calendar-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 6px;
    text-align: center;
    font-size: 12px;
}

.calendar-day {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 34px;
    text-decoration: none;
    background: rgba(255, 255, 255, 0.14);
    color: #596472;
    border: 1px solid rgba(132, 151, 176, 0.12);
    border-radius: 10px;
}

.calendar-day:hover {
    color: #4d5966;
    border-color: rgba(132, 151, 176, 0.28);
}

.calendar-day-has-post {
    border-color: rgba(132, 151, 176, 0.40);
    color: #556577;
    font-weight: 700;
}

.calendar-day-today {
    background: rgba(255, 255, 255, 0.34);
    border: 1px solid rgba(136, 162, 78, 0.80);
    color: #647440;
    font-weight: 800;
    box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.84) inset;
}

.blog-post-entry {
    padding: clamp(20px, 2.2vw, 28px);
}

.blog-post-entry hr {
    border-top: 1px solid var(--nebesko-content-border);
    opacity: 1;
}

.blog-date-shell {
    min-width: 70px;
    padding: 12px 10px;
    border-radius: 16px;
    border: 1px solid var(--nebesko-content-border);
    background: rgba(255, 255, 255, 0.22);
    box-shadow: 0 10px 26px rgba(115, 133, 158, 0.08);
}

.blog-date-day {
    font-size: 28px;
    font-weight: 700;
    color: var(--post-date-color, #8ea24e);
}

.blog-date-month {
    font-size: 12px;
    color: rgba(89, 100, 114, 0.82);
}

.blog-date-year {
    font-size: 11px;
    color: rgba(89, 100, 114, 0.56);
}

.post-meta {
    font-size: 11px;
    line-height: 1.2;
    color: rgba(89, 100, 114, 0.74);
}

.post-meta-category {
    font-weight: 700;
    color: rgba(89, 100, 114, 0.78);
}

.post-meta-tag {
    font-weight: 400;
    color: rgba(89, 100, 114, 0.72);
}

.post-meta-sep {
    margin: 0 6px;
    color: rgba(89, 100, 114, 0.34);
}

.post-author-line,
.post-views,
.comment-time {
    color: rgba(89, 100, 114, 0.72);
}

.post-actions a,
.post-actions span {
    white-space: nowrap;
}

.comment-row {
    display: flex;
    align-items: center;
    gap: 10px;
    max-width: 520px;
}

.comment-row textarea {
    flex: 1;
}

textarea.form-control,
.comment-row textarea,
input.form-control,
select.form-select {
    background-color: rgba(255, 255, 255, 0.58) !important;
    color: #53606d !important;
    border: 1px solid var(--nebesko-content-border) !important;
    border-radius: 12px;
    box-shadow: none !important;
}

textarea.form-control:focus,
.comment-row textarea:focus,
input.form-control:focus,
select.form-select:focus {
    background-color: rgba(255, 255, 255, 0.76) !important;
    color: #4c5763 !important;
    border-color: rgba(122, 141, 164, 0.42) !important;
    box-shadow: 0 0 0 0.18rem rgba(160, 177, 197, 0.16) !important;
}

textarea::placeholder,
input::placeholder {
    color: rgba(89, 100, 114, 0.54) !important;
}

.comment-avatar {
    border-radius: 50%;
    object-fit: cover;
    margin-top: 2px;
    box-shadow: 0 6px 18px rgba(114, 132, 156, 0.12);
}

.comment-body {
    position: relative;
    padding: 10px 44px 10px 12px;
}

.comment-header {
    display: flex;
    gap: 10px;
    align-items: baseline;
    margin-bottom: 2px;
}

.comment-text {
    color: rgba(89, 100, 114, 0.94);
    line-height: 1.38;
}

.comment-actions {
    position: absolute;
    top: 8px;
    right: 10px;
    display: flex;
    gap: 8px;
    align-items: center;
}

footer {
    position: relative;
    isolation: isolate;
    overflow: hidden;
    background: transparent !important;
    color: #eef3ea !important;
    margin-top: 70px !important;
    padding: clamp(140px, 16vw, 230px) 0 48px !important;
}

footer::before {
    content: '';
    position: absolute;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    background-image:
        linear-gradient(to bottom, rgba(255, 255, 255, 0.02) 0%, rgba(236, 240, 245, 0.06) 18%, rgba(107, 110, 83, 0.14) 42%, rgba(52, 60, 38, 0.30) 68%, rgba(28, 33, 22, 0.72) 100%),
        url('{% static "blog/images/design-backgrounds/nebesko_polje_bottom.png" %}');
    background-repeat: no-repeat;
    background-position: center center;
    background-size: cover;
    -webkit-mask-image: linear-gradient(to bottom, transparent 0%, rgba(0, 0, 0, 0.18) 14%, rgba(0, 0, 0, 0.72) 34%, #000 52%, #000 100%);
    mask-image: linear-gradient(to bottom, transparent 0%, rgba(0, 0, 0, 0.18) 14%, rgba(0, 0, 0, 0.72) 34%, #000 52%, #000 100%);
}

footer::after {
    content: '';
    position: absolute;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    background:
        linear-gradient(to bottom, rgba(214, 226, 247, 0.96) 0%, rgba(214, 226, 247, 0.62) 12%, rgba(214, 226, 247, 0.18) 26%, rgba(31, 36, 24, 0.00) 42%, rgba(31, 36, 24, 0.10) 100%);
}

footer > * {
    position: relative;
    z-index: 2;
}

footer .container {
    background: rgba(14, 18, 13, 0.24);
    border: 1px solid rgba(255, 255, 255, 0.14);
    border-radius: 24px;
    padding: 24px 28px;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    box-shadow: 0 16px 36px rgba(0, 0, 0, 0.16);
}

footer h5,
footer h6,
footer p,
footer div,
footer li,
footer a {
    color: #eef3ea !important;
}

footer a {
    text-decoration: none;
}

footer a:hover {
    color: #ffffff !important;
}

footer hr {
    border-color: rgba(255, 255, 255, 0.20) !important;
}

@supports not ((-webkit-mask-image: linear-gradient(#000, transparent)) or (mask-image: linear-gradient(#000, transparent))) {
    .nebesko-polje-hero::after {
        opacity: 0.88;
    }

    footer::before {
        opacity: 0.9;
    }
}

@media (max-width: 991.98px) {
    .nebesko-polje-hero {
        width: min(100vw - 16px, 1560px);
        border-radius: 24px;
    }

    .nebesko-polje-hero__inner {
        min-height: 220px;
        padding-top: 72px;
        padding-bottom: 24px;
    }

    .blog-main-layout-row {
        max-width: min(100vw - 16px, 1560px);
    }

    .page-top-align {
        margin-top: 18px;
    }

    footer {
        padding-top: 120px !important;
    }
}

@media (max-width: 767.98px) {
    .nebesko-polje-hero {
        margin-top: 2px;
        border-radius: 20px;
    }

    .nebesko-polje-hero__inner {
        min-height: 200px;
        padding-top: 66px;
        padding-bottom: 20px;
    }

    .blog-header-main {
        padding-inline: 10px;
    }

    .calendar-box,
    .archive-box,
    .sidebar-box,
    .live-analytics-widget,
    .blog-profile-panel {
        max-width: none;
        margin-left: 0;
        margin-right: 0;
    }

    .comment-row {
        flex-direction: column;
        align-items: stretch;
    }

    footer .container {
        padding: 20px 18px;
        border-radius: 18px;
    }
}
    </style>
    {% include "blog/components/blog_posts.html" %}
{% endblock %}
