<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <title>Aktivacija računa</title>
</head>
<body style="font-family: Arial, sans-serif; line-height: 1.6; color: #222;">
    <p>Pozdrav {{ user.username }},</p>

    <p>Kliknite na gumb ispod da aktivirate svoj račun:</p>

    <p style="margin: 24px 0;">
        <a href="{{ activation_url }}"
           style="display:inline-block;padding:12px 20px;background:#0d6efd;color:#fff;text-decoration:none;border-radius:8px;">
            Aktiviraj račun
        </a>
    </p>

    <p>Ako gumb ne radi, kopiraj ovaj link u preglednik:</p>
    <p><a href="{{ activation_url }}">{{ activation_url }}</a></p>

    <p>Ako niste vi kreirali račun, ignorirajte ovu poruku.</p>
</body>
</html>
